<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0d0d0d"/>

  <!-- ">" pixel art (4px grid, start x=2 y=6) -->
  <rect x="2"  y="6"  width="4" height="4" fill="#e0e0e0"/>
  <rect x="6"  y="10" width="4" height="4" fill="#e0e0e0"/>
  <rect x="10" y="14" width="4" height="4" fill="#e0e0e0"/>
  <rect x="6"  y="18" width="4" height="4" fill="#e0e0e0"/>
  <rect x="2"  y="22" width="4" height="4" fill="#e0e0e0"/>

  <!-- "_" pixel art -->
  <rect x="18" y="22" width="12" height="4" fill="#e0e0e0"/>
</svg>
