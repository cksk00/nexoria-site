<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0d0d0d"/>
  <!-- ears -->
  <polygon points="3,17 8,3 13,16" fill="#e0e0e0"/>
  <polygon points="19,16 24,3 29,17" fill="#e0e0e0"/>
  <!-- inner ears -->
  <polygon points="6,16 8,7 12,15" fill="#e8a0a0"/>
  <polygon points="20,15 24,7 26,16" fill="#e8a0a0"/>
  <!-- face -->
  <ellipse cx="16" cy="21" rx="12" ry="9" fill="#e0e0e0"/>
  <!-- eyes -->
  <ellipse cx="12" cy="20" rx="2" ry="2.3" fill="#1a1a1a"/>
  <ellipse cx="20" cy="20" rx="2" ry="2.3" fill="#1a1a1a"/>
  <!-- eye shine -->
  <circle cx="12.8" cy="19" r="0.8" fill="white"/>
  <circle cx="20.8" cy="19" r="0.8" fill="white"/>
  <!-- nose -->
  <polygon points="15,23.5 17,23.5 16,25" fill="#d07070"/>
  <!-- mouth -->
  <line x1="16" y1="25" x2="13.5" y2="26.5" stroke="#aaa" stroke-width="0.8"/>
  <line x1="16" y1="25" x2="18.5" y2="26.5" stroke="#aaa" stroke-width="0.8"/>
</svg>
