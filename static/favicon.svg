<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0d0d0d"/>

  <!-- ear tips (row 1) -->
  <rect x="4"  y="4"  width="4" height="4" fill="#e0e0e0"/>
  <rect x="24" y="4"  width="4" height="4" fill="#e0e0e0"/>

  <!-- ears with inner pink (row 2) -->
  <rect x="4"  y="8"  width="4" height="4" fill="#e0e0e0"/>
  <rect x="8"  y="8"  width="4" height="4" fill="#e8a0a0"/>
  <rect x="20" y="8"  width="4" height="4" fill="#e8a0a0"/>
  <rect x="24" y="8"  width="4" height="4" fill="#e0e0e0"/>

  <!-- face top (row 3) -->
  <rect x="4"  y="12" width="24" height="4" fill="#e0e0e0"/>

  <!-- face + eyes (row 4) -->
  <rect x="4"  y="16" width="4"  height="4" fill="#e0e0e0"/>
  <rect x="8"  y="16" width="4"  height="4" fill="#1a1a1a"/>
  <rect x="12" y="16" width="8"  height="4" fill="#e0e0e0"/>
  <rect x="20" y="16" width="4"  height="4" fill="#1a1a1a"/>
  <rect x="24" y="16" width="4"  height="4" fill="#e0e0e0"/>

  <!-- face mid (row 5) -->
  <rect x="4"  y="20" width="24" height="4" fill="#e0e0e0"/>

  <!-- face + nose (row 6) -->
  <rect x="4"  y="24" width="24" height="4" fill="#e0e0e0"/>
  <rect x="12" y="24" width="8"  height="4" fill="#d07070"/>

  <!-- chin (row 7) -->
  <rect x="8"  y="28" width="16" height="4" fill="#e0e0e0"/>
</svg>
